services:
  social_media_api:
    build: .
    ports:
      - 8000:7000
    env_file:
      - ./.env
    volumes:
      - ./:/usr/src/app:ro
    command: uvicorn app.main:app --host 0.0.0.0 --port 7000 --reload
    depends_on:
      - postgres
    networks:
      - social_media_network
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: nesttutorial2026
      POSTGRES_DB: social_media
      # ports:
      #   - "5432:5432"
    volumes:
      - postgres_db:/var/lib/postgresql/data
    networks:
      - social_media_network
    

volumes:
  postgres_db:

networks:
  social_media_network:
    driver: bridge